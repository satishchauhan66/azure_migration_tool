# Build Azure Migration Tool exe and name it with version.
# Triggers: push to main, tags v*, or manual run.
# Artifact: AzureMigrationTool-<version>.exe

name: Build EXE

on:
  push:
    branches: [main, master]
    tags: ['v*']
    paths-ignore:
      - '**.md'
      - '.gitignore'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Version for exe name (e.g. 1.0.0). Leave empty to use __version__ or tag.'
        required: false
        default: ''

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $ver = ""
          if ("${{ inputs.version_override }}" -ne "") {
            $ver = "${{ inputs.version_override }}"
          } elseif ("${{ github.event_name }}" -eq "release" -and "${{ github.event.release.tag_name }}" -ne "") {
            $ver = "${{ github.event.release.tag_name }}".TrimStart('v')
          } elseif ("${{ github.ref }}" -match 'refs/tags/v(.+)') {
            $ver = $Matches[1]
          } else {
            $ver = python -c "import sys; sys.path.insert(0, 'azure_migration_tool'); from __init__ import __version__; print(__version__)"
          }
          "version=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "Using version: $ver"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r azure_migration_tool/requirements.txt
          pip install pyinstaller

      - name: Build exe
        run: |
          python azure_migration_tool/build_exe.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Name exe with version
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          $src = "azure_migration_tool\dist\AzureMigrationTool.exe"
          $dir = "dist-versioned"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          Copy-Item $src "$dir\AzureMigrationTool-$ver.exe"
          echo "Created AzureMigrationTool-$ver.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AzureMigrationTool-${{ steps.version.outputs.version }}.exe
          path: dist-versioned/AzureMigrationTool-${{ steps.version.outputs.version }}.exe

      - name: Upload to Release (on tag/release only)
        if: github.event_name == 'release' && github.event.release.id != ''
        uses: softprops/action-gh-release@v2
        with:
          files: dist-versioned/AzureMigrationTool-${{ steps.version.outputs.version }}.exe
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
