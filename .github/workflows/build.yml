# Build Azure Migration Tool exe and NSIS installer.
# Triggers: push to main, tags v*, or manual run.
# Artifacts: AzureMigrationTool-<version>.exe, AzureMigrationTool_Setup_<version>.exe
#
# Release model (push to main):
# - ONE new GitHub Release per push: tag build/<version> (e.g. build/1.2.456).
#   Tag uses build/* (not v*) so the release does not re-trigger this workflow.
# - make_latest: true so GitHub marks it as "Latest" — no movable "latest" tag or asset churn.
# - Older builds stay as separate releases (history). Actions artifacts: 90 days.

name: Build EXE and Installer

on:
  push:
    branches: [main, master]
    tags: ['v*']
    paths-ignore:
      - '**.md'
      - '.gitignore'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Version for exe name (e.g. 1.0.0). Leave empty to use __version__ or tag.'
        required: false
        default: ''

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write  # required to create releases and tags
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $ver = ""
          if ("${{ inputs.version_override }}" -ne "") {
            $ver = "${{ inputs.version_override }}"
          } elseif ("${{ github.event_name }}" -eq "release" -and "${{ github.event.release.tag_name }}" -ne "") {
            $ver = "${{ github.event.release.tag_name }}".TrimStart('v')
          } elseif ("${{ github.ref }}" -match 'refs/tags/v(.+)') {
            $ver = $Matches[1]
          } else {
            $base = python -c "import sys; sys.path.insert(0, 'azure_migration_tool'); from __init__ import __version__; print(__version__)"
            # Push to main: bump last digit (patch) each run → 1.0.1, 1.0.2, 1.0.3, ...
            if ("${{ github.event_name }}" -eq "push" -and ("${{ github.ref }}" -eq "refs/heads/main" -or "${{ github.ref }}" -eq "refs/heads/master")) {
              $parts = $base -split '\.'
              $major = if ($parts.Length -ge 1) { $parts[0] } else { "1" }
              $minor = if ($parts.Length -ge 2) { $parts[1] } else { "0" }
              $ver = "${major}.${minor}.${{ github.run_number }}"
            } else {
              $ver = $base
            }
          }
          "version=$ver" >> $env:GITHUB_OUTPUT
          $buildVer = python -c "import sys; sys.path.insert(0, 'azure_migration_tool'); from __init__ import __version__; print(__version__)"
          "build_version=$buildVer" >> $env:GITHUB_OUTPUT
          Write-Host "Using version: $ver (build_version: $buildVer)"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r azure_migration_tool/requirements.txt
          pip install pyinstaller

      - name: Build exe
        run: |
          python azure_migration_tool/build_exe.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Prepare exe artifact (versioned name in dist)
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          $buildVer = "${{ steps.version.outputs.build_version }}"
          $src = "azure_migration_tool\dist\AzureMigrationTool_$buildVer.exe"
          $dir = "dist-versioned"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          Copy-Item $src "$dir\AzureMigrationTool-$ver.exe"
          Write-Host "Created AzureMigrationTool-$ver.exe (from build $buildVer)"

      - name: Install NSIS
        shell: pwsh
        continue-on-error: true
        run: choco install nsis -y

      - name: Build installer
        shell: pwsh
        id: installer
        run: |
          cd azure_migration_tool
          .\installer\build_installer.ps1
          $ver = "${{ steps.version.outputs.build_version }}"
          $setup = "dist\AzureMigrationTool_Setup_$ver.exe"
          if (Test-Path $setup) {
            "has_installer=true" >> $env:GITHUB_OUTPUT
          } else {
            "has_installer=false" >> $env:GITHUB_OUTPUT
            Write-Host "Installer not created (NSIS may be missing); standalone exe is still available." -ForegroundColor Yellow
          }

      - name: Prepare installer artifact
        if: steps.installer.outputs.has_installer == 'true'
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          $buildVer = "${{ steps.version.outputs.build_version }}"
          $src = "azure_migration_tool\dist\AzureMigrationTool_Setup_$buildVer.exe"
          Copy-Item $src "dist-versioned\AzureMigrationTool_Setup_$ver.exe"
          Write-Host "Created AzureMigrationTool_Setup_$ver.exe (from build $buildVer)"

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: AzureMigrationTool-${{ steps.version.outputs.version }}.exe
          path: dist-versioned/AzureMigrationTool-${{ steps.version.outputs.version }}.exe
          retention-days: 90

      - name: Upload installer artifact
        if: steps.installer.outputs.has_installer == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: AzureMigrationTool_Setup-${{ steps.version.outputs.version }}.exe
          path: dist-versioned/AzureMigrationTool_Setup_${{ steps.version.outputs.version }}.exe
          retention-days: 90

      - name: Collect release files
        id: release_files
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          $files = @("dist-versioned/AzureMigrationTool-$ver.exe")
          $setup = "dist-versioned/AzureMigrationTool_Setup_$ver.exe"
          if (Test-Path $setup) { $files += $setup }
          $joined = $files -join "`n"
          "files<<EOF" >> $env:GITHUB_OUTPUT
          $joined >> $env:GITHUB_OUTPUT
          "EOF" >> $env:GITHUB_OUTPUT

      # One release per main push — GitHub "Latest" points here; no shared release / asset churn
      - name: Create GitHub Release (main push)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build/${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }} (main)
          body: |
            Build from `main` branch — **GitHub Latest** until the next push.

            | | |
            |-|-|
            | **Version** | `${{ steps.version.outputs.version }}` |
            | **Commit** | `${{ github.sha }}` |
            | **CI run** | [Workflow run #${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

            | File | Description |
            |------|-------------|
            | `AzureMigrationTool-${{ steps.version.outputs.version }}.exe` | Standalone executable |
            | `AzureMigrationTool_Setup_${{ steps.version.outputs.version }}.exe` | Installer (if NSIS succeeded) |

            **Older builds:** [All releases](${{ github.server_url }}/${{ github.repository }}/releases). **~90 days:** [Actions artifacts](${{ github.server_url }}/${{ github.repository }}/actions).
          files: ${{ steps.release_files.outputs.files }}
          fail_on_unmatched_files: false
          make_latest: true
          allow_updates: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Manual semver tag v* or published release: attach built binaries to that release
      - name: Upload to Release (tag v* or published release)
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
          files: ${{ steps.release_files.outputs.files }}
          fail_on_unmatched_files: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
