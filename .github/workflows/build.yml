# Build Azure Migration Tool exe and NSIS installer.
# Triggers: push to main, tags v*, or manual run.
# Artifacts: AzureMigrationTool-<version>.exe, AzureMigrationTool_Setup_<version>.exe

name: Build EXE and Installer

on:
  push:
    branches: [main, master]
    tags: ['v*']
    paths-ignore:
      - '**.md'
      - '.gitignore'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Version for exe name (e.g. 1.0.0). Leave empty to use __version__ or tag.'
        required: false
        default: ''

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write  # required to push tags and create/update releases
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $ver = ""
          if ("${{ inputs.version_override }}" -ne "") {
            $ver = "${{ inputs.version_override }}"
          } elseif ("${{ github.event_name }}" -eq "release" -and "${{ github.event.release.tag_name }}" -ne "") {
            $ver = "${{ github.event.release.tag_name }}".TrimStart('v')
          } elseif ("${{ github.ref }}" -match 'refs/tags/v(.+)') {
            $ver = $Matches[1]
          } else {
            $base = python -c "import sys; sys.path.insert(0, 'azure_migration_tool'); from __init__ import __version__; print(__version__)"
            # Push to main: bump last digit (patch) each run → 1.0.1, 1.0.2, 1.0.3, ...
            if ("${{ github.event_name }}" -eq "push" -and ("${{ github.ref }}" -eq "refs/heads/main" -or "${{ github.ref }}" -eq "refs/heads/master")) {
              $parts = $base -split '\.'
              $major = if ($parts.Length -ge 1) { $parts[0] } else { "1" }
              $minor = if ($parts.Length -ge 2) { $parts[1] } else { "0" }
              $ver = "${major}.${minor}.${{ github.run_number }}"
            } else {
              $ver = $base
            }
          }
          "version=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "Using version: $ver"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r azure_migration_tool/requirements.txt
          pip install pyinstaller

      - name: Build exe
        run: |
          python azure_migration_tool/build_exe.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Prepare exe artifact (versioned name in dist)
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          $src = "azure_migration_tool\dist\AzureMigrationTool_$ver.exe"
          $dir = "dist-versioned"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          Copy-Item $src "$dir\AzureMigrationTool-$ver.exe"
          Write-Host "Created AzureMigrationTool-$ver.exe"

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y

      - name: Build installer
        shell: pwsh
        run: |
          cd azure_migration_tool
          .\installer\build_installer.ps1

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: AzureMigrationTool-${{ steps.version.outputs.version }}.exe
          path: dist-versioned/AzureMigrationTool-${{ steps.version.outputs.version }}.exe

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: AzureMigrationTool_Setup-${{ steps.version.outputs.version }}.exe
          path: azure_migration_tool/dist/AzureMigrationTool_Setup_${{ steps.version.outputs.version }}.exe

      # Push to main: update "latest" tag and create/update release so it shows on Releases page
      - name: Update latest tag (push to main only)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -d latest 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
          git tag latest
          git push origin latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or update Release (push to main – show on Releases page)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest (main)
          body: "Built from main. Download **AzureMigrationTool-${{ steps.version.outputs.version }}.exe** (standalone) or **AzureMigrationTool_Setup_${{ steps.version.outputs.version }}.exe** (installer)."
          files: |
            dist-versioned/AzureMigrationTool-${{ steps.version.outputs.version }}.exe
            azure_migration_tool/dist/AzureMigrationTool_Setup_${{ steps.version.outputs.version }}.exe
          allow_updates: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Tag v* or published release: create release if needed and attach exe + installer
      - name: Upload to Release (tag v* or published release)
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
          files: |
            dist-versioned/AzureMigrationTool-${{ steps.version.outputs.version }}.exe
            azure_migration_tool/dist/AzureMigrationTool_Setup_${{ steps.version.outputs.version }}.exe
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
